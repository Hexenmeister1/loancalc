# src/main/resources/application.yml
spring:
  application:
    name: loancalculator
  datasource:
    url: jdbc:h2:mem:loancalculator
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    show-sql: false
    open-in-view: false
  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    com.example.loancalculator: DEBUG
    org.springframework.web: INFO